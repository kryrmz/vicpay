# Full stack on your own machine, for free, with no domain and no cloud account.
# Everything runs in development mode over plain HTTP at http://localhost:
# Caddy serves the built frontend and proxies /api to the backend (same origin,
# so the httpOnly cookie works), the backend runs migrations on boot and echoes
# the OTP code to its logs. One command:
#
#   docker compose -f deploy/docker-compose.local.yml up --build
#
# Then open http://localhost. During registration, read the OTP code with:
#   docker compose -f deploy/docker-compose.local.yml logs api | grep "otp dev echo"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vicpay
      POSTGRES_PASSWORD: vicpay_dev
      POSTGRES_DB: vicpay
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vicpay"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: vicpay
      DB_PASSWORD: vicpay_dev
      DB_NAME: vicpay
      POOL_MODE: transaction
      AUTH_TYPE: scram-sha-256
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      ENVIRONMENT: development
      PORT: "8080"
      DATABASE_URL: postgres://vicpay:vicpay_dev@pgbouncer:6432/vicpay?sslmode=disable
      DATABASE_DIRECT_URL: postgres://vicpay:vicpay_dev@postgres:5432/vicpay?sslmode=disable
      JWT_SECRET: dev-secret-change-in-production-000
      PII_ENCRYPTION_KEY: dev-pii-key-change-me-32bytes-min!
      CORS_ORIGINS: http://localhost,http://127.0.0.1
      OTP_DEV_ECHO: "true"
      MIGRATIONS_DIR: /app/migrations
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
    environment:
      # ":80" makes Caddy serve plain HTTP locally (no domain, no cert needed).
      SITE_ADDRESS: ":80"
      API_UPSTREAM: api:8080
    ports:
      - "80:80"
    depends_on:
      - api
