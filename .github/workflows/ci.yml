name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vicpay
          POSTGRES_PASSWORD: vicpay_dev
          POSTGRES_DB: vicpay
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vicpay"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      # Integration tests connect DIRECTLY to Postgres (session advisory locks).
      TEST_DB_DSN: postgres://vicpay:vicpay_dev@localhost:5432/vicpay?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.12.2
          working-directory: backend
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.27.1
          gosec -severity=medium -exclude=G404 -exclude-dir=internal/testutil ./...
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.4.0
          govulncheck ./...
      - name: Test (unit + integration)
        run: go test ./... -count=1

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build
